<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details - Student Marketplace</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .product-detail {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .product-image-container {
            background: #ecf0f1;
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 400px;
        }

        .product-image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .product-details {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .product-details h1 {
            margin-bottom: 1rem;
            color: #2c3e50;
        }

        .seller-info {
            background: #ecf0f1;
            padding: 1rem;
            border-radius: 4px;
            margin: 1rem 0;
        }

        .price {
            font-size: 2rem;
            color: #27ae60;
            font-weight: bold;
            margin: 1rem 0;
        }

        .description {
            color: #555;
            line-height: 1.6;
            margin: 1rem 0;
        }

        .button-group {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }

        .button-group .btn {
            flex: 1;
        }

        @media (max-width: 768px) {
            .product-detail {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <div class="logo">
                <h1>📚 Student Marketplace</h1>
            </div>
            <div class="nav-links">
                <a href="/">Home</a>
                <a href="/dashboard.html">Dashboard</a>
            </div>
        </nav>
    </header>

    <main>
        <div class="container">
            <div class="product-detail">
                <div class="product-image-container">
                    <img src="placeholder.jpg" alt="Product" id="productImage">
                </div>
                <div class="product-details">
                    <div>
                        <h1 id="productTitle">Loading...</h1>
                        <p class="description" id="productDescription"></p>

                        <div class="seller-info">
                            <h4>Seller</h4>
                            <p id="sellerName"></p>
                        </div>

                        <div class="price" id="productPrice">$0</div>
                    </div>

                    <div class="button-group">
                        <button class="btn btn-primary" onclick="purchaseProduct()">Buy Now</button>
                        <button class="btn" onclick="contactSeller()">Contact Seller</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Student Marketplace. All rights reserved.</p>
    </footer>

    <script>
        function getProductIdFromURL() {
            const params = new URLSearchParams(window.location.search);
            return params.get('id');
        }

        function loadProductDetails() {
            const productId = getProductIdFromURL();
            if (!productId) {
                alert('Product not found');
                window.location.href = '/';
                return;
            }

            fetch(`/api/products/${productId}`)
                .then(response => response.json())
                .then(data => {
                    const product = data.product;
                    document.getElementById('productTitle').textContent = product.title;
                    document.getElementById('productDescription').textContent = product.description;
                    document.getElementById('productPrice').textContent = `$${product.price}`;
                    document.getElementById('sellerName').textContent = product.seller_name;
                    if (product.image_url) {
                        document.getElementById('productImage').src = product.image_url;
                    }
                })
                .catch(error => console.error('Error loading product:', error));
        }

        function purchaseProduct() {
            alert('Purchase functionality coming soon!');
        }

        function contactSeller() {
            alert('Contact seller functionality coming soon!');
        }

        window.addEventListener('DOMContentLoaded', loadProductDetails);
    </script>
</body>
</html>
